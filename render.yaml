services:
  - type: web
    name: tg-casino-bot
    env: python
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p /var/data
      python scripts/build_skin_catalog.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    disk:
      name: tg-casino-bot-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: BOT_DB_PATH
        value: /var/data/bot.db
      - key: SKIN_CATALOG_DB_PATH
        value: /var/data/skin_catalog.db
